services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: observability-studio-backend
    ports:
      - "8001:8001"
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: observability-studio-ui
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped